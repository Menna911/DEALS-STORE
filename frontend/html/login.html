<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Deals Store</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

    <!-- Premium Navbar -->
    <nav>
        <div class="logo">
            <h2>🛒 Deals.</h2>
        </div>
        <div class="nav-links">
            <a href="index.html">Discover</a>
        </div>
    </nav>

    <!-- Modern Login Form -->
    <div class="container">
        <div class="auth-container">
            <h2>Welcome Back</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Create one here</a>
            </p>
        </div>
    </div>

    <script src="/frontend/js/app.js"></script>
</body>
</html>
