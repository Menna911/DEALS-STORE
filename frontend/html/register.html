<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Deals Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo"><h2>🛒 Deals.</h2></div>
        <div class="nav-links"><a href="index.html">Back to Store</a></div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2>Create an Account</h2>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="reg-age">Age</label>
                    <input type="number" id="reg-age" placeholder="25" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Sign Up Now</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        // Logic specifically for the Register Page to talk to auth.php
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            btn.innerText = 'Creating account...';
            
            try {
                const response = await fetch('http://localhost:8000/api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'register',
                        name: document.getElementById('reg-name').value,
                        email: document.getElementById('reg-email').value,
                        age: document.getElementById('reg-age').value,
                        password: document.getElementById('reg-password').value
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    alert('Account created! Please log in.');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message);
                    btn.innerText = 'Sign Up Now';
                }
            } catch (error) {
                console.error('Registration failed:', error);
                btn.innerText = 'Sign Up Now';
            }
        });
    </script>
</body>
</html>
