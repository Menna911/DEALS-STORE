version: '3.8'

services:


    # backend: 

  mysql-db:
    image: mysql:latest
    container_name: mysql-db
    environment:
    - MYSQL_ROOT_PASSWORD=root 
    - MYSQL_USER=deals-user 
    - MYSQL_PASSWORD=moaazkaff
    - MYSQL_DATABASE=deals_store
    # env_file:

    restart: always
    ports:
      - "3306:3306"
    volumes:
      - mysql-volume:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql  

volumes:
  mysql-volume:   

networks:
  backend-net:
    internal: true

      