version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile

    image: moaaz65/custom-jenkins:v1.0.0
    pull_policy: missing

    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-network

volumes:
  jenkins_home:

networks:
  jenkins-network: