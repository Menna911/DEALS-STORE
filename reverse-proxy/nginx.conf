worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    client_max_body_size 10M;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain;

    log_format main '$remote_addr - [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # upstream = الحاويات اللي جوه نفس الـ docker network بتاع docker-compose
    upstream frontend_upstream {
        server frontend:80;
    }

    upstream backend_upstream {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # أي طلب بيبدأ بـ /api يروح على الـ PHP backend
        # ملحوظ: مفيش trailing slash بعد اسم الـ upstream في proxy_pass
        # عشان الـ path كامل (زي /api/offers.php) يتبعت زي ما هو للـ backend
        # لان backend/api/offers.php ده اللي php -S بيدور عليه فعليا
        location /api/ {
            proxy_pass http://backend_upstream;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # أي حاجة تانية (static files, html, css, js) تروح على الـ frontend
        location / {
            proxy_pass http://frontend_upstream;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # health check بسيط للـ reverse proxy نفسه (مفيد للـ monitoring/k8s liveness probe)
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
